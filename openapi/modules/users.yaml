paths:
  /users/me:
    get:
      tags: [Users]
      summary: Get current user
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/schemas/UserResponse'
    patch:
      tags: [Users]
      summary: Update current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/schemas/UserResponse'
