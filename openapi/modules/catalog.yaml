paths:
  /products:
    get:
      tags: [Catalog]
      summary: List products
      parameters:
        - in: query
          name: brand_id
          schema: { type: string, format: uuid }
        - in: query
          name: category
          schema: { $ref: '../components.yaml#/schemas/ProductCategory' }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/schemas/ProductListResponse'

  /products/{id}:
    get:
      tags: [Catalog]
      summary: Get product
      parameters:
        - $ref: '../components.yaml#/parameters/IdPath'
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/schemas/ProductResponse'
