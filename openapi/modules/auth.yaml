paths:
  /auth/otp/request:
    post:
      tags: [Auth]
      security: []
      summary: Request OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/schemas/OtpRequest'
      responses:
        '200':
          description: OTP requested
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/schemas/OtpRequestResponse'

  /auth/otp/verify:
    post:
      tags: [Auth]
      security: []
      summary: Verify OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/schemas/AuthTokensResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      security: []
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/schemas/RefreshRequest'
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/schemas/AuthTokensResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '../components.yaml#/schemas/EmptyOk'
